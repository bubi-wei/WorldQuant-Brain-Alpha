# Seed skeletons from validated user formulas only.
#
# NOTE:
# - This file intentionally keeps only three validated seeds.
# - Placeholders:
#   - $X*: field slots
#   - $W*: integer/quantile windows
#   - $C*: float constants
#   - $G*: group enum slots

skeletons:
  - template_str: "(-ts_mean($X1, $W1)) * rank(ts_std_dev($X1, $W2)) * rank(-ts_mean($X2, $W3))"
    operators_used: [ts_mean, rank, ts_std_dev]
    field_slots:
      - name: "$X1"
        semantic_hint: "return or price momentum signal"
      - name: "$X2"
        semantic_hint: "volume or liquidity measure"
    param_slots:
      - name: "$W1"
        type: int_window
        range: [5, 20]
        seen: [10]
      - name: "$W2"
        type: int_window
        range: [20, 60]
        seen: [40]
      - name: "$W3"
        type: int_window
        range: [20, 60]
        seen: [40]
    group_slots: []
    origin_hypothesis: "Short-term reversal with volatility and volume interaction."

  - template_str: "zscore(rank(ts_rank($X1, $W1) * ts_rank($X2, $W2))) - $C1 * zscore(rank(ts_rank($X3, $W3)))"
    operators_used: [zscore, rank, ts_rank]
    field_slots:
      - name: "$X1"
        semantic_hint: "fundamental income or profitability field"
      - name: "$X2"
        semantic_hint: "fundamental revenue or growth field"
      - name: "$X3"
        semantic_hint: "price or market signal"
    param_slots:
      - name: "$W1"
        type: int_window
        range: [252, 756]
        seen: [600]
      - name: "$W2"
        type: int_window
        range: [252, 756]
        seen: [600]
      - name: "$W3"
        type: int_window
        range: [10, 60]
        seen: [20]
      - name: "$C1"
        type: float_constant
        range: [0.8, 1.5]
        seen: [1.2]
    group_slots: []
    origin_hypothesis: "Fundamental momentum balanced against short-term price momentum."

  - template_str: "group_rank(ts_rank($X1 / $X2, $W1), $G1)"
    operators_used: [group_rank, ts_rank]
    field_slots:
      - name: "$X1"
        semantic_hint: "numerator signal such as est_eps or net_income"
      - name: "$X2"
        semantic_hint: "denominator normalizer such as close or market_cap"
    param_slots:
      - name: "$W1"
        type: int_window
        range: [20, 120]
        seen: [60]
    group_slots:
      - name: "$G1"
        candidates: [industry, subindustry, sector]
    origin_hypothesis: "Industry-relative ranking of ratio signal time-series strength."
